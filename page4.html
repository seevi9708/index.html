<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catch Hearts ❤️</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#ff758c,#ffb6c1);
font-family:Arial,sans-serif;
text-align:center;
color:white;
}

h1{
margin-top:30px;
}

#score{
font-size:22px;
margin-top:10px;
font-weight:bold;
}

.heart{
position:absolute;
font-size:40px;
cursor:pointer;
animation:float 5s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
}
100%{
transform:translateY(-120px);
}
}

#nextBtn{
display:none;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:25px;
background:white;
color:#ff4081;
margin-top:30px;
}

</style>
</head>

<body>

<h1>❤️ Catch 3 Hearts ❤️</h1>

<p>Catch 3 hearts to unlock the next surprise ✨</p>

<div id="score">0 / 3</div>

  <a href="Page5.html">
<button id="nextBtn">
 Next Surprise ➜</button>
</a>
</dev>
  
<script>

let score=0;

function createHeart(){

let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.className="heart";

heart.style.left=Math.random()*90+"%";

heart.style.top="100%";

heart.onclick=function(){

heart.remove();

score++;

document.getElementById("score").innerHTML=
score+" / 3";

if(score>=3){

document.getElementById("nextBtn").style.display="inline-block";

}

};

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

setInterval(createHeart,800);

</script>

</body>
</html>

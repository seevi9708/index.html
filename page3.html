<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blessings ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#fbc2eb,#a6c1ee);
font-family:Arial;
overflow:hidden;
}

.card{
width:85%;
max-width:420px;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,.2);
backdrop-filter:blur(10px);
color:white;
text-align:center;
}

#text{
font-size:18px;
line-height:1.8;
min-height:180px;
}

button{
padding:12px 20px;
border:none;
border-radius:20px;
background:white;
color:#ff4081;
font-size:16px;
margin-top:15px;
}

</style>
</head>

<body>

<div class="card">

<h1> Blessings For You ❤️‍🩹👰</h1>

<p id="text"></p>

<a href="page4.html">
<button>Next Surprise ➜</button>
</a>

</div>

<script>

let msg =
"May God bless you with happiness, success, good health and beautiful memories. May every dream in your life come true and may your smile never fade away. Happy Birthday Lossy🤍 ❤️";

let i=0;

function typeWriter(){

if(i < msg.length){

document.getElementById("text").innerHTML += msg.charAt(i);

i++;

setTimeout(typeWriter,40);

}

}

typeWriter();

</script>

</body>
</html>

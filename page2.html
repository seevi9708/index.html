<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Wishes</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fecfef);
font-family:Arial;
overflow:hidden;
}

.card{
background:rgba(255,255,255,0.2);
padding:25px;
border-radius:25px;
text-align:center;
color:white;
width:85%;
max-width:400px;
backdrop-filter:blur(10px);
}

h1{
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{opacity:.6;}
to{opacity:1;}
}

button{
padding:12px 20px;
border:none;
border-radius:20px;
margin-top:15px;
background:white;
color:#ff4081;
font-size:16px;
}

.heart{
position:absolute;
font-size:24px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-100px);
opacity:0;
}
}

</style>
</head>

<body>

<div class="card">

<h1>🎂 Happy Birthday 🎂</h1>

<h2>Lossy🤍</h2>

<p>
May your day be filled with happiness,
love and beautiful memories ❤️✨
</p>

<a href="page3.html">
<button>Continue ➜</button>
</a>

</div>

<script>

for(let i=0;i<25;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"%";

h.style.animationDuration=
(3+Math.random()*4)+"s";

document.body.appendChild(h);

}

</script>

</body>
</html>
